{{- if .Values.nats.persona_cache_kv_bucket.creation }}
---
apiVersion: jetstream.nats.io/v1beta2
kind: KeyValue
metadata:
  name: {{ .Values.nats.persona_cache_kv_bucket.name }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.nats.persona_cache_kv_bucket.keep }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
spec:
  bucket: {{ .Values.nats.persona_cache_kv_bucket.name }}
  replicas: {{ .Values.nats.persona_cache_kv_bucket.replicas }}
  history: {{ .Values.nats.persona_cache_kv_bucket.history }}
  storage: {{ .Values.nats.persona_cache_kv_bucket.storage }}
  maxValueSize: {{ .Values.nats.persona_cache_kv_bucket.maxValueSize }}
  maxBytes: {{ .Values.nats.persona_cache_kv_bucket.maxBytes }}
  compression: {{ .Values.nats.persona_cache_kv_bucket.compression }}
  {{- if .Values.nats.persona_cache_kv_bucket.ttl }}
  ttl: {{ .Values.nats.persona_cache_kv_bucket.ttl }}
  {{- end }}
{{- end }}
